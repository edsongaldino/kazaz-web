<div class="login-container">
  <div class="overlay"></div>

  <div class="login-box">
    <img src="assets/img/logo/logo_kazaz.png" alt="Kazaz Logo" class="logo" />

    <h1>Bem-vindo ao Kazaz</h1>
    <p class="subtitle">Acesse o painel administrativo</p>

    <form (ngSubmit)="login()" #loginForm="ngForm">
      <div class="form-group">
        <label>E-mail</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Digite seu e-mail"
          required
          [disabled]="carregando"
        />
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input
          type="password"
          name="senha"
          [(ngModel)]="senha"
          placeholder="Digite sua senha"
          required
          [disabled]="carregando"
        />
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid || carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
